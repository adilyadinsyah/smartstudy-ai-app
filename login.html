<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>SmartStudy AI - Login</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); color: #f8fafc; min-height: 100vh; display: flex; justify-content: center; align-items: center; }
        .auth-card { background: rgba(30, 41, 59, 0.7); padding: 40px; border-radius: 24px; width: 100%; max-width: 420px; text-align: center; border: 1px solid rgba(255, 255, 255, 0.1); }
        .form-group { text-align: left; margin-bottom: 24px; }
        .form-group label { display: block; font-size: 12px; color: #38bdf8; margin-bottom: 8px; }
        .form-group input { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #334155; background: #0f172a; color: white; }
        .btn-primary { width: 100%; padding: 14px; background: #0284c7; color: white; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; }
        .error-box { background: rgba(239, 68, 68, 0.2); color: #fca5a5; padding: 12px; border-radius: 12px; margin-bottom: 24px; text-align: left; font-size: 14px; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="auth-card">
        <h2>SmartStudy AI Agent</h2>
        <p style="color: #94a3b8; margin-bottom: 32px;">Silakan masuk menggunakan akun Anda</p>
        <div id="error-message" class="error-box hidden"></div>
        <form id="login-form">
            <div class="form-group">
                <label>USERNAME</label>
                <input type="text" id="username" required placeholder="Masukkan username">
            </div>
            <div class="form-group">
                <label>PASSWORD</label>
                <input type="password" id="password" required placeholder="Masukkan password">
            </div>
            <button type="submit" class="btn-primary">Login</button>
        </form>
    </div>
    <script>
        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value;
            const errorBox = document.getElementById('error-message');

            if (user === 'admin' && pass === 'admin123') {
                // Pindah langsung ke dashboard.html yang ada di folder yang sama
                window.location.href = 'dashboard.html';
            } else {
                errorBox.textContent = 'Username atau password salah!';
                errorBox.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
